name: 'GH Dynamic Assignee'
description: 'Assigns PRs to the person specified in MAINTAINER.txt'

inputs:
  github_token:
    description: 'GitHub token with PR write access'
    required: true
  label_name:
    description: 'Label that triggers assignment'
    required: false
    default: 'Ready to Merge'

runs:
  using: 'composite'
  steps:
    - name: Assign PRs to maintainer
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        LABEL_NAME: ${{ inputs.label_name }}
        EVENT_NAME: ${{ github.event_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        LABEL_ACTION: ${{ github.event.action }}
        LABEL_APPLIED: ${{ github.event.label.name }}
      run: ${{ github.action_path }}/assign.sh
